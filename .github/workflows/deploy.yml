name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # или master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # --- Если нужен билд (React/Vite) ---
      # - name: Install and Build
      #   run: |
      #     npm install
      #     npm run build
      # -----------------------------------

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Папка с сайтом (измените на 'build' или 'dist', если собираете проект)
          branch: gh-pages
